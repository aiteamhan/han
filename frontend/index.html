<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeChat - 微信网页版</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="app-wrapper">
        <!-- 左侧栏 (Sidebar) (350px) -->
        <div class="sidebar">
            <!-- 顶部导航 -->
            <div class="sidebar-header">
                <div class="user-profile">
                    <div class="avatar-wrap">
                        <img id="userAvatar" src="https://via.placeholder.com/36" alt="头像" class="avatar">
                    </div>
                    <span id="userName" class="user-name">未登录</span>
                </div>
                <div class="header-icons">
                    <input type="file" id="avatarFileInput" accept="image/*" style="display:none;" />
                    <button id="searchBtn" class="icon-btn" title="搜索">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                    </button>
                    <button id="addBtn" class="icon-btn" title="新建会话">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </button>
                    <div id="profileMenuContainer" style="position: relative; display: flex;">
                        <button id="profileMenuBtn" class="icon-btn" title="用户菜单" aria-label="用户菜单">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <circle cx="12" cy="5" r="2"/>
                                <circle cx="12" cy="12" r="2"/>
                                <circle cx="12" cy="19" r="2"/>
                            </svg>
                        </button>
                        <div id="profileMenu" class="profile-menu hidden" role="menu" aria-label="用户菜单">
                            <button type="button" id="profileChangeAvatarBtn" class="profile-menu-item">更改头像</button>
                            <button type="button" id="profileLogoutBtn" class="profile-menu-item">退出账号</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 搜索栏 -->
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索...">
            </div>

            <!-- 会话列表 -->
            <div class="conversations-list" id="conversationsList">
                <!-- 动态填充 -->
            </div>
        </div>

        <!-- 右侧栏 (Chat Window) (1fr) -->
        <div class="chat-area">
            <!-- 聊天头部 (60px) -->
            <div class="chat-header">
                <div class="chat-info">
                    <h2 id="chatTitle">选择一个会话</h2>
                    <span id="chatSubtitle" class="chat-subtitle"></span>
                </div>
                <div class="header-actions">
                    <button id="infoBtn" class="icon-btn" title="会话信息">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="16" x2="12" y2="12"></line>
                            <line x1="12" y1="8" x2="12.01" y2="8"></line>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- 消息显示区域 -->
            <div class="messages-container" id="messagesContainer">
                <div class="empty-state">
                    <p>选择一个会话开始聊天</p>
                </div>
            </div>

            <!-- "对方正在输入"提示 -->
            <div class="typing-indicator" id="typingIndicator" style="display: none;">
                <img src="https://via.placeholder.com/36" alt="" class="typing-avatar">
                <div class="typing-text">
                    <span></span><span></span><span></span>
                </div>
            </div>

            <!-- 消息输入区域 -->
            <div class="chat-footer">
                <div class="input-toolbar">
                    <button class="icon-btn" id="emojiBtn" title="表情">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5s-.67-1.5-1.5-1.5-1.5.67-1.5 1.5.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/>
                        </svg>
                    </button>
                    <button class="icon-btn" id="fileBtn" title="文件">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
                            <polyline points="13 2 13 9 20 9"></polyline>
                        </svg>
                    </button>
                </div>
                <div class="input-box">
                    <textarea id="messageInput" placeholder="输入消息..." rows="1"></textarea>
                    <button id="sendBtn" class="send-btn">发送</button>
                </div>
                <!-- 隐藏的文件输入 -->
                <input type="file" id="fileInput" multiple style="display: none;">
            </div>
        </div>

        <!-- 右侧：用户/群信息面板 -->
        <div class="info-panel" id="infoPanel">
            <div class="panel-header">
                <h3>会话信息</h3>
                <button id="closePanelBtn" class="close-btn">✕</button>
            </div>
            <div class="panel-content" id="panelContent">
                <!-- 动态填充 -->
            </div>
        </div>
    </div>

    <!-- 模态框 -->
    <div id="loginModal" class="modal">
        <div class="modal-content auth-modal">
            <div class="modal-header">
                <h2>登录</h2>
                <p class="modal-subtitle">使用你的账号登录，进入实时沟通空间。</p>
            </div>
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <input type="text" id="loginUsername" placeholder="用户名" required>
                </div>
                <div class="form-group">
                    <input type="password" id="loginPassword" placeholder="密码" required>
                </div>
                <div class="form-row">
                    <label class="checkbox-row">
                        <input type="checkbox" id="loginShowPassword">
                        <span>显示密码</span>
                    </label>
                </div>
                <button type="submit" class="btn-primary">登录</button>
                <p class="form-footer"><a href="/admin" class="admin-login-link">管理员登录</a></p>
                <p class="form-footer">没有账号？ <a href="#" id="switchToRegister">注册</a></p>
            </form>
        </div>
    </div>

    <div id="registerModal" class="modal" style="display:none;">
        <div class="modal-content auth-modal">
            <div class="modal-header">
                <h2>注册</h2>
                <p class="modal-subtitle">快速创建账户，马上开始聊天。</p>
            </div>
            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <input type="text" id="registerUsername" placeholder="用户名" required>
                </div>
                <div class="form-group">
                    <input type="password" id="registerPassword" placeholder="密码" required>
                </div>
                <div class="form-group">
                    <input type="password" id="registerConfirm" placeholder="确认密码" required>
                </div>
                <div class="form-row">
                    <label class="checkbox-row">
                        <input type="checkbox" id="registerShowPassword">
                        <span>显示密码</span>
                    </label>
                </div>
                <button type="submit" class="btn-primary">注册</button>
                <p class="form-footer">已有账号？ <a href="#" id="switchToLogin">登录</a></p>
            </form>
        </div>
    </div>

    <div id="newChatModal" class="modal" style="display:none;">
        <div class="modal-content">
            <h2>新建会话</h2>
            <input type="text" id="userSearchInput" placeholder="搜索用户..." class="search-input">
            <div id="userSearchResults" class="user-list" style="max-height: 300px; overflow-y: auto; margin-top: 10px;">
                <!-- 用户列表动态填充 -->
            </div>
        </div>
    </div>

    <!-- 加载脚本 -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/api.js"></script>
    <script src="js/websocket.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
    
    <!-- 初始化全局对象 -->
    <script>
        // 确保所有全局对象都被正确初始化
        (function initializeGlobals() {
            console.log('Initializing globals...');
            
            // 检查并创建缺失的全局对象
            if (typeof UIManager !== 'undefined' && !window.ui) {
                window.ui = new UIManager();
                console.log('Created ui instance');
            }
            
            if (typeof StorageManager !== 'undefined' && !window.storage) {
                window.storage = new StorageManager();
                console.log('Created storage instance');
            }
            
            if (typeof ApiClient !== 'undefined' && !window.api) {
                window.api = new ApiClient();
                console.log('Created api instance');
            }
            
            if (typeof WebSocketManager !== 'undefined' && !window.wsManager) {
                window.wsManager = new WebSocketManager();
                console.log('Created wsManager instance');
            }
            
            console.log('Globals initialized:', {
                ui: typeof window.ui,
                storage: typeof window.storage,
                api: typeof window.api,
                wsManager: typeof window.wsManager,
                app: typeof window.app
            });
        })();
    </script>
        <script>
            // 显示/隐藏密码切换逻辑（登录和注册表单）
            (function bindShowPassword() {
                function toggleInput(checkboxId, inputIds) {
                    const cb = document.getElementById(checkboxId);
                    if (!cb) return;
                    cb.addEventListener('change', () => {
                        inputIds.forEach(id => {
                            const inp = document.getElementById(id);
                            if (!inp) return;
                            inp.type = cb.checked ? 'text' : 'password';
                        });
                    });
                }

                toggleInput('loginShowPassword', ['loginPassword']);
                toggleInput('registerShowPassword', ['registerPassword', 'registerConfirm']);
            })();
        </script>
</body>
</html>
